name: Sync dev with master

on:
  push:
    branches: [ master ]

jobs:
  sync-dev:
    name: Fast-forward dev to master
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fast-forward dev to master
        run: |
          git checkout dev
          if git merge origin/master --ff-only; then
            git push origin dev
            echo "✅ dev has been fast-forwarded to match master."
          else
            echo "::warning::Could not fast-forward dev to master — branches have diverged."
            echo "::warning::Please manually run: git checkout dev && git merge origin/master && git push origin dev"
          fi
