name: Require dev branch for master PRs

on:
  pull_request:
    branches: [ master ]

jobs:
  check-source-branch:
    name: Ensure PR to master comes from dev
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Fail if source branch is not dev
        if: github.head_ref != 'dev'
        run: |
          echo "::error::PRs to master must come from the 'dev' branch."
          echo "::error::Current source branch: '${{ github.head_ref }}'"
          echo "::error::Please merge your changes into 'dev' first, then open a PR from 'dev' to 'master'."
          exit 1
      - name: Branch check passed
        run: echo "✅ Source branch is 'dev'. PR to master is allowed."
